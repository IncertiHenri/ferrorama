<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style/style.css">
    <title>Document</title>
</head>

<body id="body-cadastro-relatorios">


    <header>
        <div id="navbar-tela-inicial">
            <p>Olá, Admin</p>
            <img src="../assets/img/usuario.png" alt="Admin" class="imagem-usuario">
            <button id="botao-sair" onclick="sair()">Sair do Sistema</button>
        </div>
    </header>

    <main id="main-cadastro-relatorios">

  

    <div id="relatorios-analiticos">
        <h1 class="titulo-relatorios">Relatórios analíticos</h1>
        <div class="conteiners-pequenos">

            <div class="relatorio-informacao-pequena">
                <div class="bolinhas-imagem">
                    <img class="imagens-grandes-relatorio" src="../assets/img/velocidade.png" alt="velocidade">
                </div>
                <h2>Velocidade média</h2>
                <p>120Km/h</p>
            </div>


            <div class="relatorio-informacao-pequena">
                <div class="bolinhas-imagem">
                    <img class="imagens-grandes-relatorio" src="../assets/img/consumo-medio.png" alt="consumo">
                </div>
                <h2>Consumo média</h2>
                <p>75%</p>
            </div>


            <div class="relatorio-informacao-pequena">
                <div class="bolinhas-imagem">
                    <img class="imagens-grandes-relatorio" src="../assets/img/falha.png" alt="falha">
                </div>
                <h2>Falhas detectadas</h2>
                <p>12</p>
            </div>

        </div>

        <div class="conteiners-medios">

            <div class="relatorio-informacao-media">

            </div>


            <div class="relatorio-informacao-media">

            </div>

        </div>

        <div class="conteiners-grandes">

            <div class="relatorio-informacao-grande">

            </div>

        </div>

    </div>
</main>

    <script src="../scripts/script.js"></script>
