<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style/style.css">
    <title>Tela Inicial</title>
</head>

<body id="body-tela-inicial">

    <header>
        <div id="navbar-tela-inicial">
            <p>Olá, Admin</p>
            <img src="../assets/img/usuario.png" alt="Admin" class="imagem-usuario">
            <button id="botao-sair" onclick="sair()">Sair do Sistema</button>

        </div>
    </header>

    <main id="main-tela-inicial">
        <div class="menu">
            <img src="../assets/img/trem.PNG" alt="trem" class="trem-menu">
            <div class="inline-block">
                <div class="inline-flex">
                    <h1 class="titulo-menu">ASTRAL</h1>
                    <h4 class="titulo2-menu">EXPRESS</h4>
                </div>
                <p class="subtitulo-menu">SISTEMA DE MONITORAMENTO FERROVIÁRIO</p>
            </div>

            <div id="botoes-menu">
                <button class="botao-menu-atual" id="botao-menu-tela-inicial" onclick="telaInicial()"><img
                        class="imagem-botao-menu" src="../assets/img/tela-inicial.png" alt="tela-inicial"> Tela
                    inicial</button>
                <button class="botao-menu" id="botao-menu-cadastro-sensores" onclick="vizualizacaoSensores()"><img
                        class="imagem-botao-menu" src="../assets/img/cadastro-sensores.png" alt="cadastro-sensores">
                    Vizualização de Sensores</button>
                <button class="botao-menu" id="botao-menu-cadastro-trens" onclick="vizualizacaoTrens()"> <img
                        class="imagem-botao-menu" src="../assets/img/trem-botao.png" alt="trem-botao">
                    Vizualização de trens
                </button>
                <button class="botao-menu" id="botao-menu-monitoramento" onclick="monitoramentoTempoReal()"><img
                        class="imagem-botao-menu" src="../assets/img/monitoramento-tempo.png" alt="monitoramento">
                    Monitoramento em tempo
                    Real</button>
                <button class="botao-menu" id="botao-menu-cadastro-relatorios" onclick="cadastroRelatorios()"><img
                        class="imagem-botao-menu" src="../assets/img/cadastro-relatorios.png" alt="cadastro-relatorios">
                    Cadastro de
                    Relatórios</button>
                <button class="botao-menu" id="botao-menu-usuarios-cadastrados" onclick="usuariosCadastrados()"><img
                        class="imagem-botao-menu" src="../assets/img/usuarios.png" alt="usuarios-cadastrados">
                    Usuários cadastrados</button>
                <button class="botao-menu" id="botao-menu-sair-sistema"><img class="imagem-botao-menu"
                        src="../assets/img/sair.png" alt="sair">Sair do Sistema</button>
            </div>
        </div>

        <div class="conteudo-principal">


            <div class="area-boas-vindas">
                <div>
                <h2 class="titulo-boas-vindas">Bem vindo(a), Admin!</h2>
                <p class="descricao-boas-vindas">Acompanhe em tempo real o desempenho da malha ferroviária, gerencie
                    sensores e trens, visualize relatórios e monitore os usuários do sistema de forma prática, rápida e
                    eficiente.</p>
                    </div>
                    <img src="../assets/img/trem-boas-vindas.png" alt="Trem" class="imagem-trem-boas-vindas">
            </div>

            <div class="container-botoes">

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/cadastro-sensores.png" alt="Cadastro de Sensores e Trens"
                        class="imagem-cadastro-sensores">
                    <span>Cadastro de Sensores e Trens</span>
                </button>

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/monitoramento-tempo.png" alt="Monitoramento em Tempo Real"
                        class="imagem-cadastro-sensores">
                    <span>Monitoramento em Tempo Real</span>
                </button>

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/cadastro-relatorios.png" alt="Cadastro de Relatórios"
                        class="imagem-cadastro-sensores">
                    <span>Cadastro de Relatórios</span>
                </button>

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/usuarios.png" alt="Úsuarios Cadastrados" class="imagem-cadastro-sensores">
                    <span>Úsuarios Cadastrados</span>
                </button>

            </div>

        </div>
    </main>

    <script src="../scripts/script.js"></script>
</body>

</html>
