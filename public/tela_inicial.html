<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/style/style.css">
    <title>Tela Inicial</title>
</head>

<body id="body-tela-inicial">

    <header>
        <div id="navbar-tela-inicial">
            <p>Olá, Admin</p>
            <img src="../assets/img/usuario.png" alt="Admin" class="imagem-usuario">
            <button id="botao-sair" onclick="sair()">Sair do Sistema</button>

        </div>
    </header>

    <main id="main-tela-inicial">
        <div class="conteudo-principal">


            <div class="area-boas-vindas">
                <div>
                <h2 class="titulo-boas-vindas">Bem vindo(a), Admin!</h2>
                <p class="descricao-boas-vindas">Acompanhe em tempo real o desempenho da malha ferroviária, gerencie
                    sensores e trens, visualize relatórios e monitore os usuários do sistema de forma prática, rápida e
                    eficiente.</p>
                    </div>
                    <img src="../assets/img/trem-boas-vindas.png" alt="Trem" class="imagem-trem-boas-vindas">
            </div>

            <div class="container-botoes">

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/cadastro-sensores.png" alt="Cadastro de Sensores e Trens"
                        class="imagem-cadastro-sensores">
                    <span>Cadastro de Sensores e Trens</span>
                </button>

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/monitoramento-tempo.png" alt="Monitoramento em Tempo Real"
                        class="imagem-cadastro-sensores">
                    <span>Monitoramento em Tempo Real</span>
                </button>

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/cadastro-relatorios.png" alt="Cadastro de Relatórios"
                        class="imagem-cadastro-sensores">
                    <span>Cadastro de Relatórios</span>
                </button>

                <button class="botao-tela-inicial" onclick="botaoTelaInicial()">
                    <img src="../assets/img/usuarios.png" alt="Úsuarios Cadastrados" class="imagem-cadastro-sensores">
                    <span>Úsuarios Cadastrados</span>
                </button>

            </div>

        </div>
    </main>

    <script src="../scripts/script.js"></script>
</body>

</html>
